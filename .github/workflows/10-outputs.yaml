name: 10 - ouputs

on:
    workflow_dispatch:
      
jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
          build-status: ${{ steps.build.outputs.status }}
        steps:
          - name: print $GITHUB_OUPUT path
            run: echo $GITHUB_OUPUT

          - name: Build
            id: build
            run: echo "status=success" >> $GITHUB_OUPUT



    deploy:
        runs-on: ubuntu-latest
        needs: build
        if: ${{ needs.build.outputs.build-status == 'success'}}
        steps:
            - name: Deploy
              run: echo "The app is deploying..."
    