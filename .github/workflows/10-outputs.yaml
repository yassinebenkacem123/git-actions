name: 10 - Ouputs

on:
    workflow_dispatch:
      

jobs:
    build:
        runs-on: ubuntu-latest
        outputs:
          build-status: ${{ steps.build.outputs.status }}

        steps:
            - name: print GITHUB_OUTPUT path
              run: echo "$GITHUB_OUPUT"
            - name: Build
              id: build
              run: echo "status=success" >> "$GITHUB_OUPUT"
    deploy:
        runs-on: ubuntu-latest
        needs: build

        steps:
            - name: Deploy
              if: ${{ needs.build.outputs.build-status == 'success'}}
              run: echo "Depolying..."


    