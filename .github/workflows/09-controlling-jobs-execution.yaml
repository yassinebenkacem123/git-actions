name: 09 - Controlling the Execution Flow

on:
    workflow_dispatch:
        inputs:
            pass_unit_tests:
                type: boolean
                description: Whether unit tests will pass or not
                default: true
      

jobs:
    lint_build:
        runs-on: ubuntu-latest
        steps:
            - name: lint and build
              run: |
                echo "Linting and building project."
    unit_test:
        runs-on: ubuntu-latest
        steps:
            - name: Runing Unit Test
              run: |
                echo "Running tests..."
            - name: Failing test
              if: ${{ !inputs.pass_unit_tests }}
              run: |
                echo "Test failed"
                exit 1
            
    deploy_nonprod:
        runs-on: ubuntu-latest
        needs:
            - lint_build
            - unit_test
        
        steps: 
        - name: Deploying to no production
          run: |
            echo "Deploying to non production..."

    e2e-tests:
        runs-on: ubuntu-latest
        needs:
            - deploy_nonprod
        steps:
            - name: E2E Tests 
              run: |
                echo "E2E Test is Running..."
    deploy-prod:
        runs-on: ubuntu-latest
        needs:
            - e2e-tests
        
        steps:
            - name: Deploy to Prodcution
              run: |
                echo "The APP is deploying to Production..."
        